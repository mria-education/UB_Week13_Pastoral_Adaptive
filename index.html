 골로새서와 에베소서는 우주 보좌에서 가정의 바닥으로 내려오는 흐름을 보여 줍니다. 그리스도가 우주적 화해자라면, 그분의 몸인 교회와 그리스도인의 가정은 그 화해를 가장 구체적인 관계 속에서 구현해야 합니다.<\/p>\n<p>목회서신은 보존과 계승의 논리로 움직입니다. 사도가 부재하거나 죽음을 앞둔 상황에서, 거짓 가르침에 맞서 사도적 위탁을 지키기 위해 공동체는 인격과 가르침이 검증된 지도자를 세웁니다. 디모데후서는 이 제도적 논리를 고난 속의 증언으로 깊게 합니다.<\/p>\n<p>히브리서는 그림자에서 실재로, 수치에서 영광으로 이동합니다. 지상 성소의 그림자를 넘어 하늘 성소의 실재를 바라보게 하며, 사회적 수치를 피하라고 말하지 않고 오히려 그리스도와 함께 진 밖으로 나아가라고 부릅니다.<\/p>\n", "texts": "\n<h3>9. 핵심 본문 세트<\/h3>\n<p>아래 10개 본문은 화요일 5개, 금요일 5개로 나뉩니다. 각 본문은 주해 질문, 해석 질문, 통합 질문, 모델 움직임 문장으로 구성됩니다.<\/p>\n", "synthesis": "\n<h3>10–11. 성경적·형성적 종합과 결론<\/h3>\n<p>이번 주의 문헌들은 고립된 개인에게 정답 명제를 주기보다, 역사적으로 오래 견디고 우주적으로 뿌리내리며 충성스럽게 지속되는 공동체를 형성합니다. 골로새서와 에베소서는 공동체의 우주적 상상력을 형성하고, 목회서신은 제도적 지혜를 형성하며, 히브리서는 인내를 형성합니다.<\/p>\n<p>골로새서와 에베소서에서 교회는 그리스도의 우주적 화해를 보이는 다민족 공동체입니다. 목회서신에서 공동체는 사도적 위탁을 지키고 다음 세대에 전하기 위해 지도력과 구조를 배웁니다. 히브리서에서 공동체는 하늘 성소와 은혜의 보좌를 바라보며, 지친 자리에서도 믿음의 경주를 계속합니다.<\/p>\n<p>이 모든 흐름의 핵심 덕목은 ὑπομονή, 곧 인내입니다. 이것은 수동적 체념이 아니라, 이미 받은 은혜의 선물을 끝까지 붙들고 살아내는 능동적 충성입니다. 사도적 시대의 불꽃은 사라지는 것이 아니라, 우주적 그리스도론, 제도적 지혜, 제사장적 인내를 통해 역사 속에서 계속 살아 움직입니다.<\/p>\n"}, "coreTexts": [{"day": "Tuesday", "n": 1, "ref": "골로새서 1:15–20", "exegetical": "이 초기 그리스도 찬가가 잠언 8장과 지혜문학의 인격화된 지혜 이미지, 그리고 유대적 우주 매개 범주를 사용하여 그리스도를 창조와 보편적 화해의 절대적 중심으로 어떻게 제시하는가?", "hermeneutical": "그리스도 안에 신성의 충만, 곧 πλήρωμα가 거하고 보이는 것과 보이지 않는 모든 것이 십자가의 피로 화해되었다면, 현대 신자들이 그리스도 밖의 영적 보장이나 혼합주의적 안전을 덧붙이려는 태도는 어떻게 도전받는가?", "integration": "Brown의 리쿠스 계곡 혼합주의 분석과 Wright의 언약·제국 렌즈는 왜 이 찬가가 그리스도의 우월성뿐 아니라 권세들의 무장해제를 선포하는지를 어떻게 밝혀 주는가?", "model": "골로새서 찬가는 그리스도를 창조주이자 모든 권세를 무장해제하신 화해자로 위치시켜, 다원주의 세계 속에서도 그리스도 외의 다른 영적 안전장치를 덧붙이지 않고 살 수 있는 자유를 공동체에 준다."}, {"day": "Tuesday", "n": 2, "ref": "골로새서 2:8–15", "exegetical": "저자는 “공허하고 속이는 철학”과 “세상의 초등학문/영들”을 경고하면서, 그리스도의 죽음과 부활 안에서 이루어진 영적 할례가 우주적 통치자들과 권세들을 어떻게 공개적으로 무력화했다고 주장하는가?", "hermeneutical": "그리스도께서 권세들을 무장해제하고 공개적으로 부끄럽게 하셨다는 선언은 현대 그리스도인들이 문화적·정치적·경제적 우상 권세 앞에서 어떻게 두려움 없이 살도록 힘을 주는가?", "integration": "음식, 절기, 초하루 같은 규정에 대한 논쟁은 그리스도의 십자가의 충분성을 지키려는 더 넓은 바울 전통의 전략과 어떻게 연결되는가?", "model": "십자가는 패배처럼 보이지만 실제로는 권세들을 공개적으로 행진시키는 승리의 행렬이므로, 참된 영적 안전은 금욕적 도피나 혼합주의가 아니라 그리스도의 완성된 승리에 참여하는 데 있다."}, {"day": "Tuesday", "n": 3, "ref": "에베소서 2:11–22", "exegetical": "저자는 담, 시민권, 하나님의 집, 거룩한 성전 같은 공간·건축 은유를 사용하여 십자가가 유대인과 이방인 사이의 적대의 담을 허물고 한 새 사람을 창조했음을 어떻게 논증하는가?", "hermeneutical": "십자가가 적대의 담을 무너뜨려 다민족 화해 공동체를 만들었다면, 현대 교회는 자기 안의 인종적·경제적·사회적 분리를 어떻게 실제로 해체해야 하는가?", "integration": "Wright의 언약적·하나님 나라 렌즈는 에베소서 2장을 아브라함 약속의 성취이자 로마 제국의 보편 평화 주장에 대한 대안으로 어떻게 읽게 하는가?", "model": "에베소서 2장의 담 허물기는 단순한 사회 조정이 아니라 아브라함 약속의 종말론적 성취이며, 오늘의 교회는 다민족 화해 공동체로 그 십자가의 현실을 보이도록 부름받는다."}, {"day": "Tuesday", "n": 4, "ref": "에베소서 5:21–33", "exegetical": "저자는 “그리스도를 경외함으로 피차 복종하라”는 명령으로 로마의 가정 규범을 어떻게 재구성하며, 남편과 아내의 관계를 그리스도와 교회의 자기희생적 사랑으로 어떻게 재해석하는가?", "hermeneutical": "가정 질서가 지배가 아니라 그리스도의 자기비움과 거룩하게 하는 사랑에 근거한다면, 현대 가정과 공동체의 권위는 어떻게 통제에서 섬김으로 전환되어야 하는가?", "integration": "deSilva의 사회수사학적 방법은 이 본문이 로마 사회 형식을 사용하면서도 그 내부의 명예·수치 권력 질서를 어떻게 십자가 사랑으로 전복하는지 어떻게 설명하는가?", "model": "에베소서 5장은 로마 가정 구조를 그대로 복제하지 않고, 그 내부에 그리스도의 자기비움의 논리를 심어 가정 권위를 특권이 아니라 섬김으로 재구성한다."}, {"day": "Tuesday", "n": 5, "ref": "디도서 1:5–9", "exegetical": "저자는 크레타의 장로·감독 임명을 위해 어떤 도덕적, 가정적, 성경적 자격을 요구하며, 이것이 외부에 대한 신뢰성과 거짓 가르침 반박을 위해 어떻게 기능하는가?", "hermeneutical": "공동체를 파괴하는 거짓 가르침에 맞서는 제도적 방어가 성품과 환대와 절제와 가르침의 충실성이라면, 현대 교회는 지도자를 선택할 때 무엇을 우선해야 하는가?", "integration": "이 행정적 명령은 목회서신이 사도적 위탁을 세대 간에 보존하기 위해 필요한 성령 인도적 제도화를 보여 준다는 Brown의 관점과 어떻게 연결되는가?", "model": "디도서의 지도자 자격은 복음 보존이 단지 조직 기술이 아니라, 공동체와 세상 앞에서 사도적 위탁을 신뢰 가능하게 만드는 인격적 구조임을 보여 준다."}, {"day": "Friday", "n": 6, "ref": "디모데전서 2:1–7", "exegetical": "저자는 “모든 사람이 구원받기 원하시는” 하나님의 보편적 뜻을 “하나님과 사람 사이의 한 중보자, 사람이신 그리스도 예수”라는 유일 중보자 고백과 어떻게 연결하는가?", "hermeneutical": "다원주의 사회에서 그리스도의 유일한 중보자성은 현대 신자들이 어떻게 겸손하지만 확신 있는 중보기도와 증언을 하도록 부르는가?", "integration": "황제와 권세자들을 위한 기도 명령은 의심받는 소수 공동체가 로마 제국 안에서 조용하고 평화로운 삶을 확보하려는 사회수사학적 전략으로 어떻게 기능하는가?", "model": "권세자를 위한 기도는 시민적 생존 전략이면서도, 황제가 아니라 그리스도만이 하나님의 보편적 구원 뜻을 실행하는 참 중보자라는 신앙 고백이다."}, {"day": "Friday", "n": 7, "ref": "디모데후서 4:1–8", "exegetical": "고별 유언 장르 안에서 죽음을 앞둔 사도의 “말씀을 전파하라”는 명령은 다음 세대에 사도적 권위를 어떻게 넘기며, 경주의 은유는 바울의 개인적 증언과 어떻게 연결되는가?", "hermeneutical": "충성된 삶의 기준이 권력 축적이 아니라 “선한 싸움을 싸우고 달려갈 길을 마치고 믿음을 지킨 것”이라면, 현대 목회와 삶의 성공 기준은 어떻게 재정의되는가?", "integration": "Johnson의 ‘살아낸 믿음’은 이 본문에서 어떻게 교리의 정확성만이 아니라 고난 속의 몸으로 드러난 충성이 사도적 전승을 인증한다는 점을 보여 주는가?", "model": "디모데후서 4장은 사도적 계승의 가장 깊은 인증이 제도적 혈통이 아니라 복음을 위해 고난을 견디는 삶이라는 것을 보여 준다."}, {"day": "Friday", "n": 8, "ref": "히브리서 1:1–4", "exegetical": "히브리서 서문은 상속, 창조, 영광, 본체의 형상, 붙드심, 죄 정결, 보좌 우편 앉으심이라는 진술을 통해 아들이 이전 예언자적 계시보다 절대적으로 우월함을 어떻게 세우는가?", "hermeneutical": "하나님께서 최종적으로 아들을 통해 말씀하셨다면, 현대 교회는 새로운 계시 주장이나 성경 밖 권위를 어떻게 분별해야 하는가?", "integration": "아들의 우주적 선재와 창조 사역이 죄 정결이라는 역사적·제사장적 행위와 결합되는 방식은 지친 공동체를 어떻게 붙드는가?", "model": "히브리서의 서문은 우주를 붙드시는 아들이 바로 죄 정결을 이루신 분임을 선포하여, 피곤한 공동체가 더 낮은 계시로 후퇴할 필요가 없음을 보여 준다."}, {"day": "Friday", "n": 9, "ref": "히브리서 4:14–16", "exegetical": "저자는 하늘들을 통과하신 큰 대제사장의 초월성과, 우리와 같이 시험받으셨으나 죄 없으신 예수의 깊은 연대를 어떻게 함께 붙들고 있는가?", "hermeneutical": "그리스도의 제사장직이 인간 약함에 대한 공감에 근거한다면, 현대 신자들은 하나님께 나아갈 때 종교적 수행이나 가식 대신 어떤 정직한 취약성을 회복해야 하는가?", "integration": "이 본문은 지상 성막의 반복 제사가 아니라 하늘 성소에 들어가신 그리스도의 영원한 접근을 어떻게 보여 주며, deSilva의 후원자 렌즈는 왜 이 접근이 두려운 간청이 아니라 담대한 나아감인지 어떻게 설명하는가?", "model": "히브리서 4장은 하나님의 보좌가 멀리 있는 왕의 법정이 아니라 우리의 약함을 안에서 아시는 대제사장 때문에 담대히 나아갈 수 있는 은혜의 보좌임을 보여 준다."}, {"day": "Friday", "n": 10, "ref": "히브리서 11:1–3; 12:1–2", "exegetical": "믿음을 “바라는 것들의 확신, 보이지 않는 것들의 증거”로 정의하는 것은 조상들의 증인 목록과 예수, 곧 믿음의 창시자이며 완성자로 이어지는 논증을 어떻게 준비하는가?", "hermeneutical": "값비싼 헌신을 쉽게 포기하는 현대 문화 속에서, ‘인내로 경주하라’는 명령은 고난과 오래 참음을 제자도의 필수 요소로 어떻게 회복시키는가?", "integration": "Johnson의 내러티브 접근과 deSilva의 명예·수치 분석은 증인의 구름이 공동체의 WHO 정체성을 회복하고, 예수가 수치를 영광의 길로 전환한다는 점을 어떻게 밝혀 주는가?", "model": "증인의 구름은 지친 공동체의 언약 정체성을 회복하고, 예수의 모범은 사회적 수치를 후퇴의 이유가 아니라 믿음의 개척자에게 참여하는 길로 바꾼다."}], "scholars": [["Raymond E. Brown", "역사비평적 기준점. 위명 저술을 단순한 속임수보다 사도적 명예와 충실한 전승의 형식으로 읽고, 1세대 카리스마에서 지속 가능한 사도적 구조로의 전환을 조명한다."], ["N. T. Wright / Michael F. Bird", "언약적·제국 비판적 렌즈. 에베소서의 한 새 인류를 Pax Romana에 대한 Pax Christi의 대안으로 읽는다."], ["Luke Timothy Johnson", "살아낸 믿음과 목회적 진정성. 성경적 사유는 고난 속의 증언과 공동체적 실천으로 인증된다고 본다."], ["David A. deSilva", "명예, 수치, 후원, 가정 질서의 사회수사학. 히브리서를 divine Benefactor에 대한 감사와 충성의 권면으로 읽는다."], ["Bart D. Ehrman", "역사비평적 도전. 어휘, 제도화, 위명 저술 가능성을 통해 목회서신과 제2바울서신의 저작 문제를 제기한다."], ["D. A. Carson / Douglas J. Moo", "전통적 바울 저작 옹호. 바울 말년의 두 번째 사역, 비서 사용, 상황 차이를 통해 정경적 안정성을 강조한다."], ["Gordon D. Fee / Grant R. Osborne", "성령론과 해석학. 성령의 은사와 질서, 문화적 형식과 지속되는 원리의 구분을 통해 현대 적용을 돕는다."]], "glossary": [["Deutero-Pauline / 제2바울서신", "바울 전통과 연결되지만 바울 자신이 썼는지, 바울 제자가 썼는지 논의되는 서신들. 특히 골로새서와 에베소서가 여기에 포함된다."], ["목회서신", "디모데전서, 디모데후서, 디도서. 지도력, 건전한 가르침, 사도적 위탁의 보존을 다룬다."], ["Pseudepigraphy / 위명 저술", "존경받는 인물의 이름으로 쓰는 고대 문학 관습. Brown의 틀에서는 현대적 위조보다 사도적 전승의 명예로운 연장으로 이해될 수 있다."], ["Parousia / 파루시아", "그리스도의 오심 또는 임재. 그 지연은 2세대 교회가 인내와 제도적 지혜를 배우게 한다."], ["Πλήρωμα / 플레로마", "충만. 골로새서에서는 신성의 충만이 그리스도 안에 몸으로 거한다고 말한다."], ["권세들과 능력들", "그리스도 아래 놓이고 십자가로 무장해제된 우주적·영적·사회적 힘들."], ["Oikos Theou / 하나님의 집", "디모데전서 3:15의 공간 이미지. 질서 있는 교회를 하나님의 집으로 표현한다."], ["건전한 가르침", "사도적 위탁을 보존하고 파괴적 추측으로부터 가정과 공동체를 보호하는 건강한 가르침."], ["한 새 인류", "에베소서에서 유대인과 이방인이 십자가로 화해되어 하나가 된 새 백성."], ["막힌 담", "에베소서 2장의 은유. 그리스도께서 허무신 적대와 분리의 경계."], ["고별 유언", "죽음 앞의 마지막 명령 형식. 디모데후서 4장을 읽는 데 중요하다."], ["멜기세덱", "히브리서에서 그리스도의 영원한 제사장직을 설명하는 데 사용되는 제사장적 인물."], ["Logos Paraklēseōs / 권면의 말씀", "히브리서 13:22의 표현. 히브리서가 정교한 설교적 권면임을 보여 준다."], ["후원/은혜 관계", "고대 그레코-로마의 benefaction 문법. deSilva는 이를 통해 히브리서의 감사와 배교 경고를 설명한다."], ["하늘 성소", "히브리서에서 그리스도가 영원한 대제사장으로 들어가신 참된 실재의 공간."], ["Ὑπομονή / 인내", "견딤, 오래 참음, 충성스러운 지속. 히브리서와 디모데후서의 형성 덕목."]], "quiz": [{"q": "13주차 전체 문헌을 여는 중심 질문은 무엇인가?", "choices": ["교회가 구약을 완전히 대체했는가?", "묵시적 불꽃 속에서 태어난 운동이 어떻게 영혼을 잃지 않고 제도화될 수 있는가?", "로마가 언제 기독교를 국교로 삼았는가?", "바울이 네 복음서를 어떻게 썼는가?"], "a": 1, "explain": "원고는 2세대 교회가 사도적 생명력을 잃지 않으면서 지속 가능한 구조를 갖추는 문제를 중심으로 13주차를 구성한다."}, {"q": "13주차에 포함되는 문헌은 무엇인가?", "choices": ["확실한 바울서신만", "골로새서, 에베소서, 목회서신, 히브리서", " const LS = 'UBW13_ADAPTIVE_V1';
let lang = localStorage.getItem(LS + ':lang') || 'en';
let current = localStorage.getItem(LS + ':panel') || 'landing';
let done = JSON.parse(localStorage.getItem(LS + ':done') || '[]');

const $ = id => document.getElementById(id);
function D() { return APP_DATA[lang]; }
function UI() { return D().ui; }
function modules() { return D().modules; }
function save() { localStorage.setItem(LS + ':lang', lang); localStorage.setItem(LS + ':panel', current); localStorage.setItem(LS + ':done', JSON.stringify(done)); }
function setText(id, text) { const el=$(id); if(el) el.textContent=text || ''; }
function setHTML(id, html) { const el=$(id); if(el) el.innerHTML=html || ''; }
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function markDone(id) { if(!done.includes(id)) done.push(id); save(); renderNav(); updateProgress(); }

function renderHeader() {
  document.documentElement.lang = lang;
  setText('eyebrow', UI().eyebrow);
  setText('appTitle', UI().title);
  setText('tagline', UI().tagline);
  $('lang').value = lang;
  setText('printBtn', UI().print);
  setText('resetBtn', UI().reset);
  setText('markBtn', UI().mark);
  setText('panelPrev', UI().prev);
  setText('panelNext', UI().next);
  setText('footerText', UI().footer);
}

function renderLanding() {
  setText('heroTitle', UI().week);
  setText('heroClaim', UI().heroClaim);
  setText('formationAimTitle', UI().formationAimTitle);
  setText('formationAim', UI().formationAim);
  setText('methodTitle', UI().methodTitle);
  setText('method', UI().method);
  setText('thresholdTitle', UI().thresholdTitle);
  setText('threshold', UI().threshold);
  const labels = UI().statLabels || [];
  const stats = UI().stats || {};
  $('statsBox').innerHTML = Object.keys(stats).map((k,i)=>`<div class="card"><div class="stat">${esc(stats[k])}</div><div class="statlabel">${esc(labels[i] || k)}</div></div>`).join('');
}

function renderNav() {
  const nav = $('nav');
  nav.innerHTML = `<div class="nav-kicker">${esc(UI().navKicker)}</div><p class="nav-help">${esc(UI().navHelp)}</p>` +
    modules().map((m,i)=>`<button type="button" class="navbtn ${m.id===current?'active':''} ${done.includes(m.id)?'done':''}" data-target="${esc(m.id)}"><span class="navnum">${i+1}</span><span><strong>${esc(m.label)}</strong><br><small>${esc(m.subtitle)}</small></span><span class="navcheck">✓</span></button>`).join('');
  nav.querySelectorAll('button[data-target]').forEach(btn => btn.addEventListener('click', () => showPanel(btn.dataset.target)));
}

function renderModules() {
  for (const id of ['overview','context','emic','themes','canonical','logic','synthesis']) {
    setHTML(id + 'Content', D().moduleHtml[id]);
  }
  setHTML('textsContent', D().moduleHtml.texts);
  renderScholars();
  renderTextCards();
  renderGlossary();
  renderQuiz();
  renderReflectionLabels();
  renderSubmitLabels();
}

function renderScholars() {
  $('scholarCards').innerHTML = (D().scholars || []).map(s => `<div class="scholar-card"><h3>${esc(s[0])}</h3><p>${esc(s[1])}</p></div>`).join('');
  setHTML('scholarsContent', D().moduleHtml.scholars);
}

function renderTextCards() {
  const groups = {Tuesday: [], Friday: []};
  (D().coreTexts || []).forEach(t => (groups[t.day] || groups.Tuesday).push(t));
  const dayLabel = day => day === 'Tuesday' ? UI().tuesday : UI().friday;
  let html = '';
  ['Tuesday','Friday'].forEach(day => {
    html += `<div class="day-heading"><span>${esc(dayLabel(day))}</span></div>`;
    groups[day].forEach(t => {
      html += `<article class="text-card">
        <h3>Text ${t.n} — ${esc(t.ref)}</h3>
        <div class="mini-label">${esc(UI().exe)}</div><p class="prompt-line">${esc(t.exegetical)}</p>
        <div class="mini-label">${esc(UI().her)}</div><p class="prompt-line">${esc(t.hermeneutical)}</p>
        <div class="mini-label">${esc(UI().integration)}</div><p class="prompt-line">${esc(t.integration)}</p>
        <div class="mini-label">${esc(UI().model)}</div><p class="prompt-line"><strong>${esc(t.model)}</strong></p>
      </article>`;
    });
  });
  $('textCards').innerHTML = html;
}

function renderGlossary(filter='') {
  setText('glossTitle', modules().find(m=>m.id==='glossary')?.label || 'Glossary');
  $('glossSearch').placeholder = UI().search;
  const q = filter.trim().toLowerCase();
  const items = (D().glossary || []).filter(x => !q || x.join(' ').toLowerCase().includes(q));
  $('glossBox').innerHTML = items.map(x => `<div class="text-card"><h3>${esc(x[0])}</h3><p>${esc(x[1])}</p></div>`).join('');
}

function renderQuiz() {
  setText('quizTitle', modules().find(m=>m.id==='quiz')?.label || 'Quiz');
  setText('quizHelp', UI().quizHelp);
  setText('gradeBtn', UI().grade);
  $('quizBox').innerHTML = (D().quiz || []).map((q,idx) => {
    const choices = q.choices.map((c,j)=>`<label class="choice"><input type="radio" name="q${idx}" value="${j}"> ${esc(c)}</label>`).join('');
    return `<div class="q" data-q="${idx}"><p><strong>${idx+1}. ${esc(q.q)}</strong></p>${choices}<div class="feedback" id="fb${idx}" hidden></div></div>`;
  }).join('');
}

function gradeQuiz() {
  let correct = 0;
  (D().quiz || []).forEach((q,idx) => {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const fb = $('fb' + idx);
    const ok = selected && Number(selected.value) === q.a;
    if(ok) correct++;
    fb.hidden = false;
    fb.className = 'feedback ' + (ok ? 'ok' : 'no');
    fb.textContent = (ok ? UI().correct : UI().review) + q.explain;
  });
  setText('score', `${UI().score}: ${correct} / ${(D().quiz || []).length}`);
  markDone('quiz');
}

function renderReflectionLabels() {
  setText('reflectionTitle', UI().reflectionTitle);
  setText('reflectionHelp', UI().reflectionHelp);
  setText('r1Label', UI().r1); setText('r2Label', UI().r2); setText('r3Label', UI().r3); setText('r4Label', UI().r4);
  for (const id of ['r1','r2','r3','r4','student','sid','cls']) {
    const el=$(id); if(el) { el.value = localStorage.getItem(LS + ':' + id) || el.value || ''; el.oninput = () => localStorage.setItem(LS + ':' + id, el.value); }
  }
}

function renderSubmitLabels() {
  setText('submitTitle', UI().submitTitle);
  setText('submitHelp', UI().submitHelp);
  setText('studentLabel', UI().student); setText('sidLabel', UI().sid); setText('classLabel', UI().class);
  setText('exportBtn', UI().export); setText('copyBtn', UI().copy); setText('printBtn2', UI().print);
  $('exportOut').placeholder = UI().placeholder;
}

function exportPayload() {
  const payload = {
    course: UI().course, week: UI().week, topic: UI().title, language: lang,
    studentName: $('student').value, studentId: $('sid').value, className: $('cls').value,
    reflection: { insight: $('r1').value, tension: $('r2').value, question: $('r3').value, movement: $('r4').value },
    completedPanels: done, exportedAt: new Date().toISOString()
  };
  $('exportOut').value = JSON.stringify(payload, null, 2);
  markDone('submit');
  return payload;
}

function showPanel(id) {
  current = id;
  save();
  document.querySelectorAll('main>section').forEach(s => s.classList.toggle('active-section', s.id===id));
  const idx = modules().findIndex(m => m.id === id);
  const m = modules()[idx] || modules()[0];
  setText('panelTitle', m.label);
  setText('panelSubtitle', m.subtitle);
  $('panelPrev').disabled = idx <= 0;
  $('panelNext').disabled = idx >= modules().length - 1;
  renderNav();
  updateProgress();
  const main = document.querySelector('main');
  if(main) main.scrollTop = 0;
}

function updateProgress() {
  const pct = Math.round((done.length / modules().length) * 100);
  $('bar').style.width = pct + '%';
  $('pct').textContent = `${pct}% ${UI().complete}`;
}

function resetAll() {
  if(confirm(lang === 'ko' ? '진행 상황을 초기화할까요?' : 'Reset progress?')) {
    Object.keys(localStorage).filter(k => k.startsWith(LS)).forEach(k => localStorage.removeItem(k));
    done=[]; current='landing'; lang='en'; renderAll(); showPanel(current);
  }
}

function renderAll() {
  renderHeader(); renderLanding(); renderNav(); renderModules(); updateProgress();
}

document.addEventListener('DOMContentLoaded', () => {
  $('lang').addEventListener('change', e => { lang = e.target.value; save(); renderAll(); showPanel(current); });
  $('printBtn').addEventListener('click', () => window.print());
  $('printBtn2').addEventListener('click', () => window.print());
  $('resetBtn').addEventListener('click', resetAll);
  $('markBtn').addEventListener('click', () => markDone(current));
  $('panelPrev').addEventListener('click', () => { const idx = modules().findIndex(m => m.id === current); if(idx>0) showPanel(modules()[idx-1].id); });
  $('panelNext').addEventListener('click', () => { const idx = modules().findIndex(m => m.id === current); if(idx < modules().length-1) showPanel(modules()[idx+1].id); });
  $('gradeBtn').addEventListener('click', gradeQuiz);
  $('glossSearch').addEventListener('input', e => renderGlossary(e.target.value));
  $('exportBtn').addEventListener('click', exportPayload);
  $('copyBtn').addEventListener('click', async () => { const p = exportPayload(); try { await navigator.clipboard.writeText(JSON.stringify(p,null,2)); $('copyBtn').textContent = lang === 'ko' ? '복사됨' : 'Copied'; setTimeout(()=>setText('copyBtn', UI().copy), 1200); } catch(e) { $('exportOut').select(); document.execCommand('copy'); } });
  renderAll(); showPanel(current);
});
</script>
</body>
</html>
